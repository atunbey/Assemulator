server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy for Nextcloud WebDAV — avoids CORS when app is deployed
    location ^~ /nc-api/ {
        proxy_pass https://tools.kushkurriculum.org/nextcloud/;
        proxy_set_header Host tools.kushkurriculum.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        # Public-share fetches do not require browser cookies; suppress upstream cookies on localhost.
        proxy_hide_header Set-Cookie;
        # SSO redirect variants — rewrite all to stay within nginx proxy
        proxy_redirect http://127.0.0.1/ /;
        proxy_redirect https://tools.kushkurriculum.org/nextcloud/ /nc-api/;
        # Strip the 'secure' flag so cookies work over plain HTTP (localhost)
        proxy_cookie_flags ~ nosecure;
    }

    # Proxy EmulatorJS assets locally so we can force browser revalidation during development.
    location /emulatorjs/ {
        proxy_pass https://cdn.emulatorjs.org/stable/data/;
        proxy_set_header Host cdn.emulatorjs.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Serve static files; fall back to index.html for Blazor client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache Blazor boot files (they reference content-hashed assets by name)
    location ~* /(blazor\.webassembly\.js|dotnet\.js)$ {
        add_header Cache-Control "no-cache";
        gzip_static on;
    }

    # App scripts are not content-hashed; keep them revalidated to avoid stale emulator interop in browser cache.
    location ^~ /js/ {
        add_header Cache-Control "no-cache, must-revalidate";
        gzip_static on;
    }

    # Revalidate framework assets to avoid stale runtime/code mismatches across browsers.
    location ~* ^/_framework/ {
        add_header Cache-Control "no-cache, must-revalidate";
        gzip_static on;
    }

    # No cache for index.html so updates are picked up
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # No cache for JSON data files so fresh manifests/consoles are always loaded
    location ~* \.json$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Compress
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm application/octet-stream;
    gzip_min_length 1024;
}
