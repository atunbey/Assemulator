location /nc-api/ {
    proxy_pass https://tools.kushkurriculum.org/nextcloud/;
    proxy_set_header Host tools.kushkurriculum.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_hide_header Set-Cookie;
    proxy_redirect http://127.0.0.1/ /;
    proxy_redirect https://tools.kushkurriculum.org/nextcloud/ /nc-api/;
    proxy_cookie_flags ~ nosecure;
}

location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;
    proxy_set_header Accept-Encoding "";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    sub_filter_once on;
    sub_filter_types text/html;
    sub_filter '<base href="/" />' '<base href="__PATH__/" />';

    proxy_read_timeout 300;
    proxy_connect_timeout 60;
}
