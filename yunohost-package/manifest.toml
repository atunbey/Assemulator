packaging_format = 2

id = "assemulator"
name = "Assemulator"
description.en = "Retro game launcher and web emulator frontend"
description.fr = "Interface web de jeux retro et emulation navigateur"

version = "0.1.0~ynh1"

maintainers = ["atunbey"]

[upstream]
license = "MIT"
website = "https://github.com/atunbey/Assemulator"
code = "https://github.com/atunbey/Assemulator"
fund = ""

[upstream.demo]
en = ""

[integration]
yunohost = ">= 12.0"
architectures = ["amd64", "arm64"]
multi_instance = false
ldap = false
sso = false
disk = "1G"
ram.build = "512M"
ram.runtime = "256M"

[antifeatures]

[dependencies]

[install.domain]
type = "domain"

[install.path]
type = "path"
default = "/assemulator"

[install.nextcloud_base_url]
type = "string"
default = "/nextcloud"

[install.nextcloud_share_token]
type = "string"
default = "jbXHPXxAxzj8ATB"

[install.nextcloud_metadata_path]
type = "string"
default = "MetaData"

[resources]
